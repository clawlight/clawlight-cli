name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets release.yml reuse this exact suite as a pre-release gate.
  workflow_call:

env:
  CARGO_TERM_COLOR: always

# One run per branch/PR; superseded PR runs are cancelled, main runs never are.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # clippy + tests run per-OS: menubar/popover/terminal code is cfg-gated, so
  # only a matrix actually compiles (and lints) every platform's code paths.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # tao/tray-icon need gtk + appindicator, serialport needs libudev.
      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      # Includes the end-to-end suite in tests/: the hook backend and auto-namer
      # driven through the real binary (unix), install/uninstall (Linux), and
      # CLI smoke tests (all platforms).
      - name: Test
        run: cargo test --locked

  # opencode↔clawlight integration: drive the REAL embedded plugin
  # (assets/opencode-plugin.js) with opencode's actual event shapes and assert
  # the state.json the built binary writes — the boundary the Rust suite can't
  # cover. A dedicated job so it's a distinct, required PR check. Linux only: it
  # sandboxes state via $HOME like the Rust suite.
  js-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Building the binary links tao/tray-icon (gtk + appindicator) and
      # serialport (libudev), same as the test job.
      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build clawlight binary
        run: cargo build --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: opencode plugin integration tests
        run: node --test tests/js/*.test.mjs
