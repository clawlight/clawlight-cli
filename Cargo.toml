[package]
name = "clawlight"
version = "0.7.0"
edition = "2021"
description = "TUI dashboard and macOS menu bar indicator for monitoring Claude Code sessions"
license = "MIT"
repository = "https://github.com/clawlight/clawlight-cli"
homepage = "https://github.com/clawlight/clawlight-cli"
keywords = ["claude", "cli", "sessions", "tui"]
categories = ["command-line-utilities"]

[[bin]]
name = "clawlight"
path = "src/main.rs"

[dependencies]
ratatui = "0.28"
crossterm = "0.28"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
notify = "6"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
tray-icon = "0.19"
tao = "0.30"
image = { version = "0.25", default-features = false, features = ["png"] }
serialport = "4"
crc32fast = "1"
